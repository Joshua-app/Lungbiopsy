<title>LungBiopsy Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;user-select:none}
input,textarea,button,select{font-family:inherit;-webkit-appearance:none;appearance:none;border:none;outline:none}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
#app{padding-bottom:90px}
/* Header */
.hdr{background:linear-gradient(135deg,#111827,#1a2744);padding:16px;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:50}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:32px}
.hdr-title{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.hdr-sub{font-size:11px;color:#6b7fa3;text-transform:uppercase;letter-spacing:1px}
.badge{background:rgba(91,155,213,.15);border:1px solid rgba(91,155,213,.3);border-radius:10px;padding:6px 14px;text-align:center}
.badge-num{display:block;font-size:24px;font-weight:800;color:#5b9bd5;line-height:1}
.badge-lbl{font-size:10px;color:#6b7fa3;text-transform:uppercase;letter-spacing:1px}
.pending-banner{margin-top:8px;background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);border-radius:8px;padding:7px 12px;font-size:13px;color:#f0a500;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
/* Tabs */
.tabs{display:flex;background:#111827;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:73px;z-index:40}
.tab{flex:1;padding:11px 4px;background:none;color:#6b7280;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#5b9bd5;border-bottom-color:#5b9bd5}
/* Main */
.main{padding:14px}
.sec-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 8px}
/* Cards */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.summary-row{display:flex;gap:8px;margin-bottom:16px}
.summary-card{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 6px;text-align:center}
.summary-num{font-size:20px;font-weight:800;color:#5b9bd5}
.summary-lbl{font-size:10px;color:#6b7280;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
/* Comp cards */
.comp-card{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:11px 13px;margin-bottom:7px;border-left-width:4px}
.comp-name{font-size:14px;font-weight:700}
.comp-rate{font-size:18px;font-weight:800}
.comp-count{font-size:11px;color:#6b7280}
/* Bar chart */
.bar-chart{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:14px}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.bar-lbl{width:130px;font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-pct{width:38px;font-size:11px;font-weight:700;text-align:right}
/* Log */
.log-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 13px;margin-bottom:8px}
.log-hdr{cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.log-case{font-weight:700;font-size:14px}
.log-hosp{font-size:12px;color:#6b7fa3}
.log-lobe{font-size:12px;color:#5b9bd5;margin-top:2px}
.log-histo{font-size:11px;margin-top:2px;font-weight:600}
.log-date{font-size:11px;color:#6b7280}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;border:1px solid}
.log-detail{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.07)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.detail-item .dl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.8px}
.detail-item .dv{font-size:13px;font-weight:700;color:#e0e0e0;margin-top:1px}
.edit-btns{display:flex;gap:6px;margin-bottom:10px}
.edit-btn{flex:1;padding:8px;border-radius:7px;border:1px solid rgba(91,155,213,.3);background:rgba(91,155,213,.08);color:#5b9bd5;font-size:11px;font-weight:700;cursor:pointer}
.histo-panel{border-radius:9px;padding:11px 13px}
.histo-btn{width:100%;margin-top:8px;padding:8px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;background:transparent}
/* Rates */
.rates-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.rate-card{border-radius:12px;padding:14px 10px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.rate-icon{font-size:24px;margin-bottom:4px}
.rate-pct{font-size:24px;font-weight:900;line-height:1}
.rate-lbl{font-size:11px;font-weight:700;color:#ccc;margin-top:3px}
.rate-cnt{font-size:10px;color:#6b7280;margin-top:1px}
.avg-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:13px 14px}
.avg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.avg-lbl{color:#aaa}
.avg-val{font-weight:700;color:#5b9bd5}
.bench-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:13px 14px}
.bench-row{display:flex;justify-content:space-between;margin-bottom:7px}
.bench-lbl{font-size:12px;color:#aaa}
.bench-ref{font-size:13px;font-weight:700}
.bench-note{margin-top:10px;font-size:10px;color:#6b7280;border-top:1px solid rgba(255,255,255,.07);padding-top:8px}
/* Hospital drill */
.hosp-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:10px 13px;margin-bottom:4px;cursor:pointer}
.hosp-name{font-size:13px;font-weight:600}
.hosp-cnt{font-size:12px;color:#6b7280}
.sub-case{background:rgba(255,255,255,.02);border:1px solid rgba(91,155,213,.15);border-radius:9px;padding:9px 11px;margin-bottom:5px;margin-left:6px}
.view-btn{font-size:11px;color:#5b9bd5;background:rgba(91,155,213,.1);border:1px solid rgba(91,155,213,.25);border-radius:5px;padding:3px 7px;cursor:pointer;font-weight:700}
/* Lobes */
.lobe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:4px}
.lobe-card{background:rgba(91,155,213,.08);border:1px solid rgba(91,155,213,.2);border-radius:9px;padding:9px 6px;text-align:center}
.lobe-num{font-size:20px;font-weight:800;color:#5b9bd5}
.lobe-lbl{font-size:10px;color:#6b7fa3;font-weight:700;margin-top:1px}
/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#5b9bd5,#3b7abf);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 18px rgba(91,155,213,.5);display:flex;align-items:center;justify-content:center;z-index:100;line-height:1}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;z-index:200}
.modal{width:100%;background:#161d2b;border-radius:20px 20px 0 0;padding:22px 16px;max-height:92vh;overflow-y:auto;border:1px solid rgba(255,255,255,.08)}
.modal-title{font-size:19px;font-weight:800;color:#fff;text-align:center;margin-bottom:3px}
.modal-sub{font-size:12px;color:#6b7280;text-align:center;margin-bottom:18px}
.field-lbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.field-hint{font-weight:400;text-transform:none;letter-spacing:0;margin-left:5px;color:#4b5563}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:11px 12px;color:#e0e0e0;font-size:15px}
.fi-wrap{position:relative}
.fi-unit{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:#6b7280;font-size:12px;pointer-events:none}
textarea.fi{resize:vertical;min-height:70px;line-height:1.5}
.seg{display:flex;gap:5px;flex-wrap:wrap}
.seg-btn{padding:6px 13px;border-radius:18px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#aaa;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.seg-btn.active{background:rgba(91,155,213,.2);border-color:#5b9bd5;color:#5b9bd5}
.toggle-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s}
.toggle-track{width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.1);position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s}
.modal-actions{display:flex;gap:8px;margin-top:18px;padding-bottom:2px}
.btn-cancel{flex:1;padding:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#aaa;font-size:14px;font-weight:700;cursor:pointer}
.btn-submit{flex:2;padding:13px;background:linear-gradient(135deg,#5b9bd5,#3b7abf);border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.btn-green{background:linear-gradient(135deg,#4ade80,#16a34a)}
.comp-toggle{width:100%;display:flex;align-items:center;gap:10px;padding:11px 13px;margin-bottom:7px;border-radius:10px;border:1px solid;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.04)}
.step-dots{display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.step-dot{width:9px;height:9px;border-radius:50%;transition:background .3s}
.step-line{width:36px;height:2px;transition:background .3s}
.sect-tabs{display:flex;gap:5px;margin-bottom:18px;background:rgba(255,255,255,.04);border-radius:9px;padding:3px}
.sect-tab{flex:1;padding:7px 3px;border-radius:7px;border:none;cursor:pointer;font-size:10px;font-weight:700;transition:all .15s}
/* Toast */

<body>
<div id="app"></div>
<script>
// Register inline service worker so Chrome shows "Add to Home Screen" prompt
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE='lb-preview-v1';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.href])).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request).then(r=>{const c=r.clone();caches.open(CACHE).then(x=>x.put(e.request,c));return r;}).catch(()=>caches.match(self.location.href))));});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>

<script>
// ── Data ─────────────────────────────────────────────────────
const SK = 'lungbiopsy_v5';
const DK = 'lungbiopsy_disc_v1';

const COMPS = [
  {id:'haemoptysis', label:'Haemoptysis',  icon:'🩸', color:'#e05252', bg:'rgba(224,82,82,0.12)'},
  {id:'pneumothorax',label:'Pneumothorax', icon:'💨', color:'#5b9bd5', bg:'rgba(91,155,213,0.12)'},
  {id:'chest_drain', label:'Chest Drain',  icon:'🪣', color:'#f0a500', bg:'rgba(240,165,0,0.12)'},
  {id:'air_embolus', label:'Air Embolus',  icon:'🫧', color:'#a855f7', bg:'rgba(168,85,247,0.12)'},
  {id:'death',       label:'Death',        icon:'☠️', color:'#6b7280', bg:'rgba(107,114,128,0.15)'},
];
const LOBES = ['RUL','RML','RLL','LUL','LLL'];
const SUPS  = ['Direct','Indirect','Independent'];
const LTYPES= ['Solid','Subsolid','Ground Glass','Cavitating'];

function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{totalBiopsies:0,log:[]}}catch{return{totalBiopsies:0,log:[]}}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}

let STATE = load();
let UI = {
  tab:'dashboard', expandedLog:null, selectedHospital:null, showPending:false,
  addModal:false, addStep:0,
  addForm:{hospitalName:'',hospitalNumber:'',datePerformed:'',age:'',sex:'',supervision:'',lobe:'',lesionType:'',lesionSize:'',distance:'',emphysemaTrack:false,needleSize:'',passes:'',comments:''},
  addComps:{},
  editId:null, editSection:'details',
  editForm:{}, editComps:{}, editHisto:{diagnosis:'',histologyNotes:'',diagnosticSample:null},
  confirmClear:false, toast:null, toastTimer:null,
  screen:'disclaimer', // 'disclaimer' | 'privacy' | 'app'
};

function showToast(msg,type='ok'){
  clearTimeout(UI.toastTimer);
  UI.toast={msg,type};
  render();
  UI.toastTimer=setTimeout(()=>{UI.toast=null;render()},2500);
}

function pct(n,t){return t?((n/t)*100).toFixed(1)+'%':'—'}
function avg(vals){const ns=vals.filter(v=>v!==''&&!isNaN(parseFloat(v))).map(parseFloat);return ns.length?(ns.reduce((a,b)=>a+b,0)/ns.length).toFixed(1):null}
function fmtDate(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function fmtShort(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function fmtDateInput(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch{return iso}}

function deriveCounts(log){
  const c={emphysema:0,diagnostic:0,histoPending:0};
  COMPS.forEach(x=>c[x.id]=0);
  log.forEach(e=>{
    (e.complications||[]).forEach(id=>{if(c[id]!==undefined)c[id]++});
    if(e.emphysemaTrack)c.emphysema++;
    if(e.diagnosticSample===true)c.diagnostic++;
    if(e.diagnosticSample===null||e.diagnosticSample===undefined)c.histoPending++;
  });
  return c;
}

// ── HTML helpers ──────────────────────────────────────────────
function h(tag,attrs,inner){
  const el=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==='class')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  if(typeof inner==='string')el.innerHTML=inner;
  else if(Array.isArray(inner))inner.filter(Boolean).forEach(c=>el.appendChild(c));
  else if(inner)el.appendChild(inner);
  return el;
}
function div(cls,inner,style){return h('div',{class:cls,...(style?{style}:{})},inner)}
function btn(cls,text,onclick){return h('button',{class:cls,onClick:onclick},text)}
function span(cls,text,style){const s=h('span',{class:cls,...(style?{style}:{})});s.textContent=text;return s}
function input(type,val,onchange,placeholder,extraStyle){
  const el=document.createElement('input');
  el.type=type;el.value=val||'';el.placeholder=placeholder||'';
  el.className='fi';
  if(extraStyle)Object.assign(el.style,extraStyle);
  if(type==='date')el.style.colorScheme='dark';
  el.addEventListener('input',e=>onchange(e.target.value));
  return el;
}
function textarea(val,onchange,placeholder){
  const el=document.createElement('textarea');
  el.className='fi';el.value=val||'';el.placeholder=placeholder||'';
  el.addEventListener('input',e=>onchange(e.target.value));
  return el;
}
function field(label,hint,child){
  const lbl=div('');
  const lblText=document.createElement('div');
  lblText.className='field-lbl';
  lblText.textContent=label;
  if(hint){const ht=h('span',{class:'field-hint'},hint);lblText.appendChild(ht)}
  lbl.appendChild(lblText);lbl.appendChild(child);
  lbl.style.marginBottom='13px';
  return lbl;
}
function segPicker(options,value,onChange,color='#5b9bd5'){
  const wrap=div('seg');
  options.forEach(opt=>{
    const b=div('seg-btn'+(value===opt?' active':''),opt);
    b.addEventListener('click',()=>onChange(value===opt?'':opt));
    if(value===opt){b.style.background=color+'22';b.style.borderColor=color;b.style.color=color}
    wrap.appendChild(b);
  });
  return wrap;
}
function toggleBtn(value,onChange,label,description,color='#f0a500'){
  const el=div('toggle-btn');
  el.style.border=`1px solid ${value?color:'rgba(255,255,255,0.1)'}`;
  el.style.background=value?color+'18':'rgba(255,255,255,0.03)';
  const txt=div('');
  const ttl=div('');ttl.style.cssText=`font-size:14px;font-weight:600;color:${value?color:'#ccc'}`;ttl.textContent=label;txt.appendChild(ttl);
  if(description){const d=div('');d.style.cssText='font-size:12px;color:#6b7280;margin-top:2px';d.textContent=description;txt.appendChild(d)}
  const track=div('toggle-track');track.style.background=value?color:'rgba(255,255,255,0.1)';
  const thumb=div('toggle-thumb');thumb.style.left=value?'21px':'3px';track.appendChild(thumb);
  el.appendChild(txt);el.appendChild(track);
  el.addEventListener('click',()=>onChange(!value));
  return el;
}

// ── Disclaimer ────────────────────────────────────────────────
function renderDisclaimer(){
  const accepted=localStorage.getItem(DK)==='accepted';
  if(accepted){UI.screen='app';return renderApp()}

  let scrolled=false;
  const wrap=div('disc-wrap');
  wrap.appendChild(h('span',{},'🫁').outerHTML&&(()=>{const s=document.createElement('div');s.style.cssText='font-size:44px;margin-bottom:8px';s.textContent='🫁';return s})());
  const title=div('hdr-title','LungBiopsy');title.style.cssText='font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:3px';
  const sub=div('hdr-sub','Tracker');sub.style.cssText='font-size:12px;color:#6b7fa3;text-transform:uppercase;letter-spacing:1px;margin-bottom:24px';
  wrap.appendChild(title);wrap.appendChild(sub);

  const box=div('disc-box');
  const dh=div('disc-hdr');dh.innerHTML='<span style="font-size:18px">⚠️</span><div><div style="font-size:14px;font-weight:800;color:#e05252">Important Disclaimer</div><div style="font-size:11px;color:#9ca3af;margin-top:1px">Please read before continuing</div></div>';
  box.appendChild(dh);

  const body=div('disc-body');
  body.innerHTML=`
    <div style="font-weight:700;color:#f0a500;margin-bottom:5px">🔬 Purpose</div>
    <p style="margin-bottom:12px">This app is designed solely as a <strong style="color:#e0e0e0">personal audit and logbook tool</strong> to help clinicians track CT-guided lung biopsy procedures for reflective practice.</p>
    <div style="font-weight:700;color:#f0a500;margin-bottom:5px">🚫 Not a Medical Device</div>
    <p style="margin-bottom:12px">This app is <strong style="color:#e05252">not a validated medical device</strong> and has not been assessed by the MHRA. It must <strong style="color:#e05252">not</strong> be used to inform clinical decisions.</p>
    <div style="font-weight:700;color:#f0a500;margin-bottom:5px">🤖 AI-Assisted Development</div>
    <p style="margin-bottom:12px">This application was developed with AI assistance (Claude, Anthropic). It has not undergone formal software validation or clinical safety assessment.</p>
    <div style="font-weight:700;color:#f0a500;margin-bottom:5px">🔒 Data & Privacy</div>
    <p style="margin-bottom:12px">You are responsible for ensuring data entered complies with your organisation's GDPR policies. Do not enter directly identifiable patient information.</p>
    <div style="font-weight:700;color:#f0a500;margin-bottom:5px">⚖️ Liability</div>
    <p style="margin-bottom:20px">The developer accepts no liability for clinical outcomes, data loss, or misuse of this application.</p>
  `;

  const scrollHint=div('');scrollHint.style.cssText='text-align:center;color:#4b5563;font-size:11px;padding-bottom:8px;font-style:italic';scrollHint.textContent='↓ Scroll to read all before accepting';
  body.appendChild(scrollHint);

  body.addEventListener('scroll',()=>{
    if(body.scrollTop+body.clientHeight>=body.scrollHeight-20){
      scrolled=true;scrollHint.style.display='none';
      acceptBtn.style.background='linear-gradient(135deg,#5b9bd5,#3b7abf)';
      acceptBtn.style.color='#fff';acceptBtn.style.cursor='pointer';
      acceptBtn.textContent='I Understand & Accept';
    }
  });

  const footer=div('disc-footer');
  const acceptBtn=div('disc-accept');
  acceptBtn.style.cssText='width:100%;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:not-allowed;background:rgba(255,255,255,0.08);color:#4b5563;transition:all .3s';
  acceptBtn.textContent='Read the full disclaimer above';
  acceptBtn.addEventListener('click',()=>{
    if(!scrolled)return;
    localStorage.setItem(DK,'accepted');
    UI.screen='app';render();
  });
  const privLink=h('button',{style:{background:'none',border:'none',color:'#4b5563',fontSize:'11px',cursor:'pointer',textDecoration:'underline',marginTop:'10px',display:'block',width:'100%',textAlign:'center'}},'View Privacy Policy');
  privLink.addEventListener('click',()=>{UI.screen='privacy';render()});
  const byLine=div('');byLine.style.cssText='text-align:center;font-size:10px;color:#374151;margin-top:8px';byLine.textContent='By accepting you confirm this is for personal audit purposes only';

  footer.appendChild(acceptBtn);footer.appendChild(byLine);footer.appendChild(privLink);
  box.appendChild(body);box.appendChild(footer);
  wrap.appendChild(box);
  return wrap;
}

// ── Privacy Policy ────────────────────────────────────────────
function renderPrivacy(){
  const wrap=div('priv-wrap');
  const phdr=div('priv-hdr');
  const backBtn=h('button',{style:{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'7px',color:'#e0e0e0',fontSize:'13px',fontWeight:'700',padding:'5px 11px',cursor:'pointer'}},'← Back');

  });
  const note=div('');note.style.cssText='background:rgba(91,155,213,.08);border:1px solid rgba(91,155,213,.2);border-radius:9px;padding:11px 13px;font-size:11px;color:#6b9fd4;line-height:1.6';
  note.textContent='ℹ️ Consult your Trust\'s Information Governance team before deploying this app for use by colleagues.';

// ── Main App ──────────────────────────────────────────────────
function renderApp(){
  const total=STATE.totalBiopsies;
  const log=STATE.log||[];
  const counts=deriveCounts(log);
  const noComp=log.filter(e=>(e.complications||[]).length===0).length;
  const avgLesion=avg(log.map(e=>e.lesionSize));
  const avgDist=avg(log.map(e=>e.distance));
  const hPend=counts.histoPending;
  const hospitals={};
  log.forEach(e=>{if(e.hospitalName)hospitals[e.hospitalName]=(hospitals[e.hospitalName]||0)+1});
  const lobeMap={};
  log.forEach(e=>{if(e.lobe)lobeMap[e.lobe]=(lobeMap[e.lobe]||0)+1});

  const app=div('');

  // ── Header
  const hdr=div('hdr');
  const hrow=div('hdr-row');
  const hleft=div('hdr-left');
  const hicon=div('hdr-icon','🫁');
  const htxt=div('');
  htxt.innerHTML=`<div class="hdr-title">LungBiopsy</div><div class="hdr-sub">Tracker</div>`;
  hleft.appendChild(hicon);hleft.appendChild(htxt);
  const hright=div('');hright.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:5px';
  const badge=div('badge');
  badge.innerHTML=`<span class="badge-num">${total}</span><span class="badge-lbl">cases</span>`;
  hright.appendChild(badge);
  hrow.appendChild(hleft);hrow.appendChild(hright);hdr.appendChild(hrow);

  if(hPend>0){
    const pb=div('pending-banner');
    pb.innerHTML=`<span>⏳</span><span>${hPend} case${hPend!==1?'s':''} awaiting histology</span>`;
    pb.addEventListener('click',()=>{UI.showPending=!UI.showPending;render()});
    hdr.appendChild(pb);
  }
  app.appendChild(hdr);

  // ── Tabs
  const tabs=div('tabs');
  [['dashboard','📊 Dashboard'],['log','📋 Log'],['rates','📈 Rates']].forEach(([id,lbl])=>{
    const t=div('tab'+(UI.tab===id?' active':''),lbl);
    t.addEventListener('click',()=>{UI.tab=id;UI.expandedLog=null;render()});
    tabs.appendChild(t);
  });
  app.appendChild(tabs);

  const main=div('main');

  // ════════ DASHBOARD ════════
  if(UI.tab==='dashboard'){
    // Summary row
    const sr=div('summary-row');
    [[total,'Total Cases','#5b9bd5'],[pct(noComp,total),'No Complication','#22c55e'],[pct(counts.diagnostic,total),'Diagnostic Yield','#a3e635']].forEach(([n,l,c])=>{
      const sc=div('summary-card');
      sc.innerHTML=`<div class="summary-num" style="color:${c}">${n}</div><div class="summary-lbl">${l}</div>`;
      sr.appendChild(sc);
    });
    main.appendChild(sr);

    // Histology pending list
    if(hPend>0&&UI.showPending){
      const pl=div('');pl.style.cssText='background:rgba(240,165,0,0.04);border:1px solid rgba(240,165,0,0.2);border-radius:0 0 10px 10px;padding:8px;margin-bottom:4px';
      log.filter(e=>e.diagnosticSample===null||e.diagnosticSample===undefined).forEach(entry=>{
        const idx=log.length-log.indexOf(entry);
        const sc2=div('sub-case');
        sc2.style.border='1px solid rgba(240,165,0,0.2)';
        const row=div('');row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start';
        const info=div('');
        info.innerHTML=`<div style="font-weight:700;font-size:13px">Case #${idx}${entry.hospitalName?` · <span style="color:#6b7fa3">${entry.hospitalName}</span>`:''}</div>${entry.lobe?`<div style="font-size:11px;color:#5b9bd5">${entry.lobe}</div>`:''}${entry.datePerformed?`<div style="font-size:11px;color:#6b7280">${fmtDateInput(entry.datePerformed)}</div>`:''}`;
        const vb=btn('view-btn','Add Result',()=>{UI.tab='log';UI.expandedLog=entry.id;UI.showPending=false;render()});
        vb.style.color='#f0a500';vb.style.background='rgba(240,165,0,0.1)';vb.style.border='1px solid rgba(240,165,0,0.3)';
        row.appendChild(info);row.appendChild(vb);sc2.appendChild(row);pl.appendChild(sc2);
      });
      main.appendChild(pl);
    }

    // Lobe distribution
    if(Object.keys(lobeMap).length>0){
      const st=div('sec-title','Lobe Distribution');main.appendChild(st);
      const lg=div('lobe-grid');
      LOBES.forEach(l=>{
        const lc=div('lobe-card');lc.style.opacity=lobeMap[l]?'1':'0.3';
        lc.innerHTML=`<div class="lobe-num">${lobeMap[l]||0}</div><div class="lobe-lbl">${l}</div>`;
        lg.appendChild(lc);
      });
      main.appendChild(lg);
    }

    // Hospitals
    if(Object.keys(hospitals).length>0){
      const st=div('sec-title','By Hospital');main.appendChild(st);
      Object.entries(hospitals).sort((a,b)=>b[1]-a[1]).forEach(([h,n])=>{
        const isOpen=UI.selectedHospital===h;
        const hr=div('hosp-row');
        hr.style.borderColor=isOpen?'rgba(91,155,213,0.4)':'rgba(255,255,255,0.05)';
        hr.style.background=isOpen?'rgba(91,155,213,0.08)':'rgba(255,255,255,0.03)';
        hr.innerHTML=`<span class="hosp-name">🏥 ${h}</span><div style="display:flex;align-items:center;gap:6px"><span class="hosp-cnt">${n} case${n!==1?'s':''}</span><span style="color:#6b7280;font-size:11px">${isOpen?'▲':'▼'}</span></div>`;
        hr.addEventListener('click',()=>{UI.selectedHospital=isOpen?null:h;render()});
        main.appendChild(hr);
        if(isOpen){
          const sub=div('');sub.style.marginBottom='6px';
          log.filter(e=>e.hospitalName===h).forEach(entry=>{
            const idx=log.length-log.indexOf(entry);
            const sc2=div('sub-case');
            const row=div('');row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start';

        mo.appendChild(field('Emphysema in Needle Track',null,toggleBtn(!!UI.editForm.emphysemaTrack,v=>{UI.editForm.emphysemaTrack=v},'Emphysema Present','')));
        const nprow=div('');nprow.style.cssText='display:flex;gap:10px';
        const nswrap=div('');nswrap.style.flex='1';nswrap.appendChild(field('Needle Size',null,input('text',UI.editForm.needleSize||'',v=>{UI.editForm.needleSize=v},'e.g. 18G')));
        const pswrap=div('');pswrap.style.flex='1';pswrap.appendChild(field('Passes',null,input('number',UI.editForm.passes||'',v=>{UI.editForm.passes=v},'e.g. 3')));
        nprow.appendChild(nswrap);nprow.appendChild(pswrap);mo.appendChild(nprow);
        mo.appendChild(field('Comments','(optional)',textarea(UI.editForm.comments||'',v=>{UI.editForm.comments=v},'Any additional notes...')));
        const ma=div('modal-actions');
        ma.appendChild(btn('btn-cancel','Cancel',()=>{UI.editId=null;render()}));
        ma.appendChild(btn('btn-submit','Save Changes ✓',saveEdit));
        mo.appendChild(ma);
      } else if(UI.editSection==='complications'){
        mo.appendChild(div('modal-title','Edit Complications'));
        mo.appendChild(div('modal-sub','Update or add delayed complications'));
        COMPS.forEach(c=>{
          const sel=UI.editComps[c.id]||false;
          const ct=div('comp-toggle');
          ct.style.borderColor=sel?c.color:'rgba(255,255,255,0.1)';
          ct.style.background=sel?c.bg:'rgba(255,255,255,0.04)';
          ct.innerHTML=`<span style="font-size:22px">${c.icon}</span><div style="flex:1;text-align:left"><div style="font-weight:600;color:${sel?c.color:'#ccc'}">${c.label}</div></div><span style="color:${sel?c.color:'#555'};font-size:18px">${sel?'✓':'○'}</span>`;
          ct.addEventListener('click',()=>{UI.editComps[c.id]=!UI.editComps[c.id];render()});
          mo.appendChild(ct);
        });
        mo.appendChild(field('Complication Notes','(optional)',textarea(UI.editComps._notes!==undefined?UI.editComps._notes:(entry.complicationNotes||''),v=>{UI.editComps._notes=v},'e.g. Small pneumothorax, resolved spontaneously...')));
        const ma=div('modal-actions');
        ma.appendChild(btn('btn-cancel','Cancel',()=>{UI.editId=null;render()}));
        ma.appendChild(btn('btn-submit','Save Changes ✓',saveEdit));
        mo.appendChild(ma);
      } else {
        mo.appendChild(div('modal-title','Histology Result'));
        const esub=div('modal-sub',`Biopsy: ${fmtShort(entry.date)}${entry.lobe?' · '+entry.lobe:''}`);mo.appendChild(esub);
        mo.appendChild(field('Diagnosis',null,input('text',UI.editHisto.diagnosis||'',v=>{UI.editHisto.diagnosis=v},'e.g. Adenocarcinoma, SCC, Benign...')));
        mo.appendChild(field('Histology Notes','(optional)',textarea(UI.editHisto.histologyNotes||'',v=>{UI.editHisto.histologyNotes=v},'e.g. Grade, mutation status, TNM staging...')));
        const dsfield=div('');dsfield.style.marginBottom='13px';
        const dslbl=div('');dslbl.style.cssText='font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px';dslbl.textContent='Diagnostic Sample Obtained?';
        const dsrow=div('');dsrow.style.cssText='display:flex;gap:8px';
        [{label:'✅ Yes — Diagnostic',val:true,c:'#22c55e'},{label:'❌ No — Non-diagnostic',val:false,c:'#e05252'}].forEach(opt=>{
          const b=div('');
          const isActive=UI.editHisto.diagnosticSample===opt.val;
          b.style.cssText=`flex:1;padding:9px 5px;border-radius:9px;cursor:pointer;transition:all .15s;border:1px solid ${isActive?opt.c:'rgba(255,255,255,0.1)'};background:${isActive?opt.c+'18':'rgba(255,255,255,0.04)'};color:${isActive?opt.c:'#aaa'};font-size:11px;font-weight:700;text-align:center`;
          b.textContent=opt.label;
          b.addEventListener('click',()=>{UI.editHisto.diagnosticSample=opt.val;render()});
          dsrow.appendChild(b);
        });
        dsfield.appendChild(dslbl);dsfield.appendChild(dsrow);mo.appendChild(dsfield);
        const ma=div('modal-actions');
        ma.appendChild(btn('btn-cancel','Cancel',()=>{UI.editId=null;render()}));
        const sb=btn('btn-submit btn-green','Save Result ✓',saveEdit);mo.appendChild(ma);ma.appendChild(sb);
      }
      ov.addEventListener('click',()=>{UI.editId=null;render()});
      mo.addEventListener('click',e=>e.stopPropagation());
      ov.appendChild(mo);app.appendChild(ov);
    }
  }

  // ── Confirm clear
  if(UI.confirmClear){
    const ov=div('overlay');
    const mo=div('modal');
    mo.appendChild(div('modal-title','Reset All Data?'));
    const txt=div('');txt.style.cssText='color:#aaa;text-align:center;margin-bottom:22px;font-size:13px';txt.textContent=`This will permanently delete all ${total} biopsy records.`;
    mo.appendChild(txt);
    const ma=div('modal-actions');
    ma.appendChild(btn('btn-cancel','Cancel',()=>{UI.confirmClear=false;render()}));
    const db=btn('btn-submit','Delete All',()=>{STATE={totalBiopsies:0,log:[]};save(STATE);UI.confirmClear=false;showToast('All data cleared','warn')});
    db.style.background='#e05252';ma.appendChild(db);mo.appendChild(ma);
    ov.addEventListener('click',()=>{UI.confirmClear=false;render()});
    mo.addEventListener('click',e=>e.stopPropagation());
    ov.appendChild(mo);app.appendChild(ov);
  }

  // Toast
  if(UI.toast){
    const t=div('toast',UI.toast.msg);
    t.style.background=UI.toast.type==='warn'?'#c0392b':'#1e6b3d';
    app.appendChild(t);
  }

  return app;
}

function submitAdd(){
  const complications=COMPS.filter(c=>UI.addComps[c.id]).map(c=>c.id);
  const entry={
    id:Date.now(),date:new Date().toISOString(),
    hospitalName:UI.addForm.hospitalName,hospitalNumber:UI.addForm.hospitalNumber,
    datePerformed:UI.addForm.datePerformed,age:UI.addForm.age,sex:UI.addForm.sex,
    supervision:UI.addForm.supervision,lobe:UI.addForm.lobe,lesionType:UI.addForm.lesionType,
    lesionSize:UI.addForm.lesionSize,distance:UI.addForm.distance,
    emphysemaTrack:UI.addForm.emphysemaTrack,needleSize:UI.addForm.needleSize,
    passes:UI.addForm.passes,comments:UI.addForm.comments,
    complicationNotes:UI.addComps._notes||'',
    complications,diagnosis:'',histologyNotes:'',diagnosticSample:null,histologyDate:null,
  };
  STATE.totalBiopsies++;STATE.log.unshift(entry);save(STATE);
  UI.addModal=false;showToast('Case recorded');
}

function openEdit(entry,section){
  UI.editId=entry.id;UI.editSection=section;
  UI.editForm={
    hospitalName:entry.hospitalName||'',hospitalNumber:entry.hospitalNumber||'',
    datePerformed:entry.datePerformed||'',age:entry.age||'',sex:entry.sex||'',
    supervision:entry.supervision||'',lobe:entry.lobe||'',lesionType:entry.lesionType||'',
    lesionSize:entry.lesionSize||'',distance:entry.distance||'',
    emphysemaTrack:!!entry.emphysemaTrack,needleSize:entry.needleSize||'',
    passes:entry.passes||'',comments:entry.comments||'',complicationNotes:entry.complicationNotes||'',
  };
  const compsMap={};COMPS.forEach(c=>{compsMap[c.id]=entry.complications.includes(c.id)});
  UI.editComps={...compsMap,_notes:entry.complicationNotes||''};
  UI.editHisto={diagnosis:entry.diagnosis||'',histologyNotes:entry.histologyNotes||'',diagnosticSample:entry.diagnosticSample??null};
  UI.expandedLog=null;render();
}

function saveEdit(){
  STATE.log=STATE.log.map(e=>{
    if(e.id!==UI.editId)return e;
    const b={...e};
    if(UI.editSection==='details'||UI.editSection==='complications'){
      Object.assign(b,UI.editForm);
      b.complications=COMPS.filter(c=>UI.editComps[c.id]).map(c=>c.id);
      b.complicationNotes=UI.editComps._notes!==undefined?UI.editComps._notes:(e.complicationNotes||'');
    }
    if(UI.editSection==='histology'){
      b.diagnosis=UI.editHisto.diagnosis;b.histologyNotes=UI.editHisto.histologyNotes;
      b.diagnosticSample=UI.editHisto.diagnosticSample;
      b.histologyDate=b.histologyDate||new Date().toISOString();
    }
    return b;
  });
  save(STATE);UI.editId=null;showToast(UI.editSection==='histology'?'Histology saved':'Case updated');
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('app');
  root.innerHTML='';
  let content;
  if(UI.screen==='disclaimer')content=renderDisclaimer();
  else if(UI.screen==='privacy')content=renderPrivacy();
  else content=renderApp();
  root.appendChild(content);
}

render();
</script>
</body>
</html>
