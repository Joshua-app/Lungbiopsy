  <script>
    if('serviceWorker' in navigator){
      const sw=`const CACHE='lb-v3';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.href,'https://unpkg.com/react@18/umd/react.production.min.js','https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','https://unpkg.com/@babel/standalone/babel.min.js'])).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(h=>{if(h)return h;return fetch(e.request).then(r=>{if(!r||r.status!==200)return r;const c=r.clone();caches.open(CACHE).then(x=>x.put(e.request,c));return r;}).catch(()=>caches.match(self.location.href));}));});`;

<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;

function DrainIcon({ size=22 }) {
  const hose = "#5b9bd5";   // blue hose pipe
  const bucket = "#f0a500"; // amber bucket
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* Hose pipe — vertical section coming from top */}
      <rect x="13.5" y="1" width="4" height="10" rx="2" fill={hose}/>
      {/* Hose nozzle tip */}
      <rect x="12" y="10" width="7" height="3" rx="1.5" fill={hose}/>
      {/* Hose bend — curves right then down into bucket */}
      <path d="M15.5 13 Q15.5 18 21 18" stroke={hose} strokeWidth="3.5" strokeLinecap="round" fill="none"/>
      {/* Hose end nozzle pointing down */}
      <rect x="19.5" y="17" width="3.5" height="5" rx="1.5" fill={hose}/>
      {/* Water drips from nozzle */}
      <circle cx="21.5" cy="24" r="1" fill={hose} opacity="0.5"/>
      <circle cx="21.5" cy="27" r="0.7" fill={hose} opacity="0.3"/>
      {/* Bucket body */}
      <path d="M5 21 L7 31 L19 31 L21 21 Z" fill={bucket} opacity="0.9"/>
      {/* Bucket rim */}
      <rect x="4" y="19.5" width="18" height="3" rx="1.5" fill={bucket}/>
      {/* Bucket handle */}
      <path d="M8 19.5 Q13 15 18 19.5" stroke={bucket} strokeWidth="1.8" strokeLinecap="round" fill="none" opacity="0.65"/>
      {/* Liquid in bucket */}
      <path d="M7.5 27 L18.5 27 L19 31 L7 31 Z" fill="white" opacity="0.18"/>
    </svg>
  );
}

function CompIcon({ comp, size=22 }) {
  if (comp.icon === "drain") return <DrainIcon size={size}/>;
  return <span style={{fontSize:size-2,lineHeight:1}}>{comp.icon}</span>;
}

const COMPS = [
  { id:"haemoptysis",  label:"Haemoptysis",  icon:"🩸", color:"#e05252", bg:"rgba(224,82,82,0.12)" },
  { id:"pneumothorax", label:"Pneumothorax", icon:"💨", color:"#5b9bd5", bg:"rgba(91,155,213,0.12)" },
  { id:"chest_drain",  label:"Chest Drain",  icon:"drain", color:"#f0a500", bg:"rgba(240,165,0,0.12)" },
  { id:"air_embolus",  label:"Air Embolus",  icon:"🫧", color:"#a855f7", bg:"rgba(168,85,247,0.12)" },
  { id:"death",        label:"Death",        icon:"☠️", color:"#6b7280", bg:"rgba(107,114,128,0.15)" },
];
const LOBES  = ["RUL","RML","RLL","LUL","LLL"];
const SUPS   = ["Direct","Indirect","Independent"];
const LTYPES = ["Solid","Part Solid","Ground Glass","Cavitating"];

const EMPTY_FORM = {
  hospitalName:"", caseRef:"", datePerformed:"", age:"", sex:"",
  supervision:"", lobe:"", lesionType:"", lesionSize:"", distance:"",
  emphysemaTrack:false, needleSize:"", passes:"", comments:""
};

function pct(n,t){ return t ? ((n/t)*100).toFixed(1)+"%" : "—"; }
function avgOf(arr){
  const ns = arr.filter(v => v && !isNaN(+v)).map(Number);
  return ns.length ? (ns.reduce((a,b)=>a+b,0)/ns.length).toFixed(1) : null;
}
function fmtD(iso){
  if(!iso) return "";
  try { return new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
  catch { return iso; }
}

// ── Styles ─────────────────────────────────────────────────
const C = {
  bg: "#0d1117", card: "rgba(255,255,255,0.03)", border: "rgba(255,255,255,0.07)",
  blue: "#5b9bd5", green: "#22c55e", amber: "#f0a500", red: "#e05252", lime: "#a3e635",
};
const inputSt = {
  width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.14)",
  borderRadius:9, padding:"10px 12px", color:"#e0e0e0", fontSize:14, outline:"none",
  fontFamily:"inherit", boxSizing:"border-box",
};
const taSt = { ...inputSt, resize:"vertical", minHeight:68, lineHeight:1.5 };
const secTitle = { fontSize:11, fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:"1.5px", margin:"16px 0 8px" };
const cancelBt = { flex:1, padding:"12px", background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:10, color:"#aaa", fontSize:14, fontWeight:700, cursor:"pointer" };
const saveBt   = { flex:2, padding:"12px", background:"linear-gradient(135deg,#5b9bd5,#3b7abf)", border:"none", borderRadius:10, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer" };

// ── Small components ────────────────────────────────────────
function FL({ label, hint, children }) {
  return (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"1px",marginBottom:5}}>
        {label}{hint && <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,marginLeft:5,color:"#4b5563",fontSize:11}}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function Seg({ options, value, onChange, color="#5b9bd5" }) {
  return (
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
      {options.map(o => {
        const on = value === o;
        return (
          <button key={o} onClick={() => onChange(on ? "" : o)} style={{
            padding:"6px 12px", borderRadius:18, border:`1px solid ${on?color:"rgba(255,255,255,0.1)"}`,
            background:on?color+"22":"rgba(255,255,255,0.04)", color:on?color:"#aaa",
            fontSize:12, fontWeight:600, cursor:"pointer",
          }}>{o}</button>
        );
      })}
    </div>
  );
}

function Tog({ value, onChange, label, color="#f0a500" }) {
  return (
    <button onClick={() => onChange(!value)} style={{
      width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
      padding:"10px 12px", borderRadius:10, cursor:"pointer",
      border:`1px solid ${value?color:"rgba(255,255,255,0.1)"}`,
      background:value?color+"18":"rgba(255,255,255,0.03)",
    }}>
      <span style={{fontSize:13,fontWeight:600,color:value?color:"#ccc"}}>{label}</span>
      <div style={{width:38,height:20,borderRadius:10,background:value?color:"rgba(255,255,255,0.1)",position:"relative",flexShrink:0}}>
        <div style={{width:14,height:14,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:value?21:3,transition:"left 0.2s"}}/>
      </div>
    </button>
  );
}

function Overlay({ onClose, children }) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"flex-end",zIndex:200}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:"#161d2b",borderRadius:"18px 18px 0 0",padding:"20px 14px",maxHeight:"92vh",overflowY:"auto",border:"1px solid rgba(255,255,255,0.09)"}}>
        {children}
      </div>
    </div>
  );
}

function ModalTitle({ main, sub }) {
  return (
    <>
      <div style={{fontSize:18,fontWeight:800,color:"#fff",textAlign:"center",marginBottom:3}}>{main}</div>
      {sub && <div style={{fontSize:12,color:"#6b7280",textAlign:"center",marginBottom:16}}>{sub}</div>}
    </>
  );
}

function Chip({ comp }) {
  return (
    <span style={{fontSize:11,fontWeight:600,borderRadius:20,padding:"2px 9px",background:comp.bg,color:comp.color,border:`1px solid ${comp.color}44`}}>
<CompIcon comp={comp} size={13}/> {comp.label}
    </span>
  );
}

function CompToggle({ comp, selected, onToggle }) {
  return (
    <button onClick={onToggle} style={{
      width:"100%", display:"flex", alignItems:"center", gap:10, padding:"10px 12px", marginBottom:6,
      borderRadius:10, cursor:"pointer",
      border:`1px solid ${selected?comp.color:"rgba(255,255,255,0.1)"}`,
      background:selected?comp.bg:"rgba(255,255,255,0.04)",
    }}>
      <span style={{display:"flex",alignItems:"center",justifyContent:"center",width:24}}><CompIcon comp={comp} size={20}/></span>
      <span style={{flex:1,textAlign:"left",fontWeight:600,color:selected?comp.color:"#ccc",fontSize:13}}>{comp.label}</span>
      <span style={{color:selected?comp.color:"#555",fontSize:18}}>{selected?"✓":"○"}</span>
    </button>
  );
}

// ── Disclaimer ─────────────────────────────────────────────
function Disclaimer({ onAccept }) {
  const [scrolled, setScrolled] = useState(false);
  return (
    <div style={{minHeight:"100%",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px",overflowY:"auto"}}>
      <div style={{fontSize:40,marginBottom:8}}>🫁</div>
      <div style={{fontSize:20,fontWeight:800,color:"#fff",marginBottom:2}}>LungBiopsy Tracker</div>
      <div style={{fontSize:11,color:"#6b7fa3",textTransform:"uppercase",letterSpacing:"1px",marginBottom:22}}>Preview Mode</div>
      <div style={{width:"100%",maxWidth:400,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,overflow:"hidden"}}>
        <div style={{background:"rgba(224,82,82,0.12)",padding:"11px 15px",display:"flex",alignItems:"center",gap:8}}>
          <span>⚠️</span>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:"#e05252"}}>Important Disclaimer</div>
            <div style={{fontSize:11,color:"#9ca3af"}}>Scroll to read before accepting</div>
          </div>
        </div>
        <div onScroll={e=>{const el=e.target;if(el.scrollTop+el.clientHeight>=el.scrollHeight-10)setScrolled(true);}}
          style={{maxHeight:280,overflowY:"auto",padding:"14px 15px 8px",fontSize:12,color:"#d1d5db",lineHeight:1.7}}>
          <div style={{fontWeight:700,color:"#f0a500",marginBottom:4}}>🔬 Purpose</div>
          <p style={{marginBottom:12}}>Personal audit and logbook tool for CT-guided lung biopsy procedures. For reflective practice only.</p>
          <div style={{fontWeight:700,color:"#f0a500",marginBottom:4}}>🚫 Not a Medical Device</div>
          <p style={{marginBottom:12}}>Not validated by the MHRA. Must not be used to inform clinical decisions.</p>
          <div style={{fontWeight:700,color:"#f0a500",marginBottom:4}}>🤖 AI-Assisted Development</div>
          <p style={{marginBottom:12}}>Developed with AI assistance (Claude, Anthropic). No formal clinical safety assessment.</p>
          <div style={{fontWeight:700,color:"#f0a500",marginBottom:4}}>🔒 Data & Privacy</div>
          <p style={{marginBottom:12}}>Do not enter directly identifiable patient data. Use case reference codes only. Comply with your Trust's GDPR policy.</p>
          <div style={{fontWeight:700,color:"#f0a500",marginBottom:4}}>⚖️ Liability</div>
          <p style={{marginBottom:16}}>Developer accepts no liability for clinical outcomes or data loss.</p>
          {!scrolled && <div style={{textAlign:"center",color:"#4b5563",fontSize:11,fontStyle:"italic",paddingBottom:8}}>↓ Scroll to read all</div>}
        </div>
        <div style={{padding:"12px 15px",background:"rgba(0,0,0,0.2)"}}>
          <button onClick={scrolled?onAccept:undefined} style={{
            width:"100%",padding:"12px",borderRadius:9,border:"none",fontSize:14,fontWeight:700,
            cursor:scrolled?"pointer":"not-allowed",
            background:scrolled?"linear-gradient(135deg,#5b9bd5,#3b7abf)":"rgba(255,255,255,0.08)",
            color:scrolled?"#fff":"#4b5563",
          }}>{scrolled?"I Understand & Accept":"Read all before accepting"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────
function App() {
  const [accepted, setAccepted] = useState(()=>{ try{return localStorage.getItem('lb_disc')==='accepted';}catch{return false;} });

  // Data
  const [cases, setCasesRaw] = useState(()=>{ try{const r=localStorage.getItem('lb_cases');return r?JSON.parse(r):[];}catch{return[];} });
  const [total, setTotalRaw] = useState(()=>{ try{const r=localStorage.getItem('lb_total');return r?parseInt(r):0;}catch{return 0;} });
  function setCases(fn){setCasesRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;try{localStorage.setItem('lb_cases',JSON.stringify(next));}catch{}return next;});}
  function setTotal(fn){setTotalRaw(prev=>{const next=typeof fn==='function'?fn(prev):fn;try{localStorage.setItem('lb_total',String(next));}catch{}return next;});}

  // UI
  const [tab, setTab] = useState("dashboard");
  const [expandedId, setExpandedId] = useState(null);
  const [selHosp, setSelHosp] = useState(null);
  const [showPending, setShowPending] = useState(false);
  const [toast, setToast] = useState(null);
  const [confirmClear, setConfirmClear] = useState(0); // 0=off, 1=first check, 2=second check

  // Settings / defaults
  const [settings, setSettings] = useState(()=>{ try{const r=localStorage.getItem('lb_settings');return r?JSON.parse(r):{defaultHospital:"",defaultSupervision:"",defaultNeedleSize:"",defaultPasses:"",yourName:""};}catch{return{defaultHospital:"",defaultSupervision:"",defaultNeedleSize:"",defaultPasses:"",yourName:""};} });
  function setSetting(key, val) { setSettings(p => { const n={...p,[key]:val}; try{localStorage.setItem('lb_settings',JSON.stringify(n));}catch{} return n; }); }

  // Search / filter
  const [search, setSearch] = useState("");
  const [showFilters, setShowFilters] = useState(false);
  const [fType, setFType] = useState("");
  const [fLobe, setFLobe] = useState("");
  const [fDiag, setFDiag] = useState("");
  const [fComp, setFComp] = useState("");

  // Add modal
  const [addOpen, setAddOpen] = useState(false);
  const [addStep, setAddStep] = useState(0);
  const [addForm, setAddForm] = useState({ ...EMPTY_FORM });
  const [addComps, setAddComps] = useState({});
  const [addCompNotes, setAddCompNotes] = useState("");

  // Edit modal
  const [editEntry, setEditEntry] = useState(null);
  const [editSec, setEditSec] = useState("details");
  const [editForm, setEditForm] = useState({ ...EMPTY_FORM });
  const [editComps, setEditComps] = useState({});
  const [editCompNotes, setEditCompNotes] = useState("");
  const [editHisto, setEditHisto] = useState({ diagnosis:"", histologyNotes:"", diagnosticSample:null });

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }

  function exportData() {
    try {
      const blob = new Blob([JSON.stringify({ cases, total, exportedAt: new Date().toISOString() }, null, 2)], { type:"application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "LungBiopsy_Backup_" + new Date().toISOString().slice(0,10) + ".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url); showToast("Backup downloaded ✓");
    } catch { showToast("Export failed"); }
  }

  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.cases || !Array.isArray(parsed.cases)) throw new Error();
        setCases(parsed.cases); setTotal(parsed.total || parsed.cases.length);
        showToast("Restored " + parsed.cases.length + " cases ✓");
      } catch { showToast("Import failed — invalid file"); }
    };
    reader.readAsText(file); e.target.value = "";
  }

  // ── Add case ──
  function openAdd() {
    setAddForm({
      ...EMPTY_FORM,
      hospitalName: settings.defaultHospital,
      supervision: settings.defaultSupervision,
      needleSize: settings.defaultNeedleSize,
      passes: settings.defaultPasses,
    });
    setAddComps({});
    setAddCompNotes("");
    setAddStep(0);
    setAddOpen(true);
  }

  function saveCase() {
    const comps = COMPS.filter(c => addComps[c.id]).map(c => c.id);
    const newCase = {
      id: Date.now(),
      createdAt: new Date().toISOString(),
      hospitalName: addForm.hospitalName,
      caseRef: addForm.caseRef,
      datePerformed: addForm.datePerformed,
      age: addForm.age,
      sex: addForm.sex,
      supervision: addForm.supervision,
      lobe: addForm.lobe,
      lesionType: addForm.lesionType,
      lesionSize: addForm.lesionSize,
      distance: addForm.distance,
      emphysemaTrack: addForm.emphysemaTrack,
      needleSize: addForm.needleSize,
      passes: addForm.passes,
      comments: addForm.comments,
      complications: comps,
      complicationNotes: addCompNotes,
      diagnosis: "",
      histologyNotes: "",
      diagnosticSample: null,
      histologyDate: null,
    };
    setCases(prev => [newCase, ...prev]);
    setTotal(prev => prev + 1);
    setAddOpen(false);
    showToast("Case recorded ✓");
  }

  // ── Edit case ──
  function openEdit(entry, sec) {
    setEditEntry(entry);
    setEditSec(sec || "details");
    setEditForm({
      hospitalName: entry.hospitalName||"",
      caseRef: entry.caseRef||"",
      datePerformed: entry.datePerformed||"",
      age: entry.age||"",
      sex: entry.sex||"",
      supervision: entry.supervision||"",
      lobe: entry.lobe||"",
      lesionType: entry.lesionType||"",
      lesionSize: entry.lesionSize||"",
      distance: entry.distance||"",
      emphysemaTrack: !!entry.emphysemaTrack,
      needleSize: entry.needleSize||"",
      passes: entry.passes||"",
      comments: entry.comments||"",
    });
    const cm = {};
    COMPS.forEach(c => { cm[c.id] = (entry.complications||[]).includes(c.id); });
    setEditComps(cm);
    setEditCompNotes(entry.complicationNotes||"");
    setEditHisto({
      diagnosis: entry.diagnosis||"",
      histologyNotes: entry.histologyNotes||"",
      diagnosticSample: entry.diagnosticSample ?? null,
    });
    setExpandedId(null);
  }

  function saveEdit() {
    setCases(prev => prev.map(e => {
      if (e.id !== editEntry.id) return e;
      if (editSec === "details") {
        return { ...e, ...editForm };
      }
      if (editSec === "complications") {
        return {
          ...e, ...editForm,
          complications: COMPS.filter(c => editComps[c.id]).map(c => c.id),
          complicationNotes: editCompNotes,
        };
      }
      if (editSec === "histology") {
        return {
          ...e,
          diagnosis: editHisto.diagnosis,
          histologyNotes: editHisto.histologyNotes,
          diagnosticSample: editHisto.diagnosticSample,
          histologyDate: e.histologyDate || new Date().toISOString(),
        };
      }
      return e;
    }));
    setEditEntry(null);
    showToast(editSec === "histology" ? "Histology saved ✓" : "Case updated ✓");
  }

  // ── Derived stats ──
  const counts = { emphysema:0, diagnostic:0, histoPending:0 };
  COMPS.forEach(c => { counts[c.id] = 0; });
  cases.forEach(e => {
    (e.complications||[]).forEach(id => { if(counts[id]!==undefined) counts[id]++; });
    if(e.emphysemaTrack) counts.emphysema++;
    if(e.diagnosticSample===true) counts.diagnostic++;
    if(e.diagnosticSample===null||e.diagnosticSample===undefined) counts.histoPending++;
  });
  const noComp = cases.filter(e=>(e.complications||[]).length===0).length;
  const avgLesion = avgOf(cases.map(e=>e.lesionSize));
  const avgDist   = avgOf(cases.map(e=>e.distance));
  const hospitals = {};
  cases.forEach(e => { if(e.hospitalName) hospitals[e.hospitalName] = (hospitals[e.hospitalName]||0)+1; });
  const lobeMap = {};
  cases.forEach(e => { if(e.lobe) lobeMap[e.lobe] = (lobeMap[e.lobe]||0)+1; });

  // Filter
  function matches(e) {
    if(search){
      const hay=[e.diagnosis,e.histologyNotes,e.comments,e.complicationNotes,e.hospitalName,e.lobe,e.lesionType].filter(Boolean).join(" ").toLowerCase();
      if(!hay.includes(search.toLowerCase())) return false;
    }
    if(fType && e.lesionType!==fType) return false;
    if(fLobe && e.lobe!==fLobe) return false;
    if(fDiag && ![e.diagnosis||"",e.histologyNotes||""].join(" ").toLowerCase().includes(fDiag.toLowerCase())) return false;
    if(fComp){ const comp=COMPS.find(c=>c.label===fComp); if(comp&&!(e.complications||[]).includes(comp.id)) return false; }
    return true;
  }
  const filtered = cases.filter(matches);
  const hasFilter = !!(search||fType||fLobe||fDiag||fComp);

  if (!accepted) {
    return <div style={{height:"100vh",overflow:"auto",background:C.bg}}><Disclaimer onAccept={()=>setAccepted(true)}/></div>;
  }

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:"#e0e0e0",fontFamily:"'Segoe UI',system-ui,sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:90}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#111827,#1a2744)",padding:"14px 16px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:30}}>🫁</span>
            <div>
              <div style={{fontSize:19,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>Lung Biopsy</div>
              <div style={{fontSize:10,color:"#6b7fa3",textTransform:"uppercase",letterSpacing:"1px"}}>{settings.yourName ? settings.yourName + " · Tracker" : "Tracker"}</div>
            </div>
          </div>
          <div style={{background:"rgba(91,155,213,0.15)",border:"1px solid rgba(91,155,213,0.3)",borderRadius:10,padding:"6px 14px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:C.blue,lineHeight:1}}>{total}</div>
            <div style={{fontSize:10,color:"#6b7fa3",textTransform:"uppercase"}}>cases</div>
          </div>
        </div>
        {counts.histoPending>0 && (
          <div onClick={()=>setShowPending(p=>!p)} style={{marginTop:8,background:"rgba(240,165,0,0.1)",border:"1px solid rgba(240,165,0,0.25)",borderRadius:8,padding:"6px 12px",fontSize:12,color:C.amber,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <span>⏳</span><span>{counts.histoPending} case{counts.histoPending!==1?"s":""} awaiting histology — tap to view</span>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"#111827",borderBottom:`1px solid ${C.border}`,position:"sticky",top:73,zIndex:40}}>
        {[["dashboard","📊 Dashboard"],["log","📋 Log"],["rates","📈 Rates"],["settings","⚙️ Settings"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"11px 4px",background:"none",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",color:tab===id?C.blue:"#6b7280",borderBottom:`2px solid ${tab===id?C.blue:"transparent"}`}}>{lbl}</button>
        ))}
      </div>

      <div style={{padding:"14px"}}>

        {/* ═══ DASHBOARD ═══ */}
        {tab==="dashboard" && <>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            {[[total,"Total Cases",C.blue],[pct(noComp,total),"No Complication",C.green],[pct(counts.diagnostic,total),"Diagnostic Yield",C.lime]].map(([n,l,c])=>(
              <div key={l} style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 6px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:c}}>{n}</div>
                <div style={{fontSize:10,color:"#6b7280",marginTop:2,textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div>
              </div>
            ))}
          </div>

          {/* Histology pending */}
          {counts.histoPending>0 && showPending && (
            <div style={{background:"rgba(240,165,0,0.04)",border:"1px solid rgba(240,165,0,0.2)",borderRadius:10,padding:8,marginBottom:10}}>
              {cases.filter(e=>e.diagnosticSample===null||e.diagnosticSample===undefined).map((entry,_,arr)=>{
                const idx=cases.length-cases.indexOf(entry);
                return (
                  <div key={entry.id} style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"8px 10px",marginBottom:5,border:"1px solid rgba(240,165,0,0.15)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:12}}>Case #{idx}{entry.hospitalName&&<span style={{color:"#6b7fa3"}}> · {entry.hospitalName}</span>}</div>
                        {entry.lobe&&<div style={{fontSize:11,color:C.blue}}>{entry.lobe}</div>}
                        {entry.datePerformed&&<div style={{fontSize:11,color:"#6b7280"}}>{fmtD(entry.datePerformed)}</div>}
                      </div>
                      <button onClick={()=>{setTab("log");setExpandedId(entry.id);setShowPending(false);}} style={{fontSize:11,color:C.amber,background:"rgba(240,165,0,0.1)",border:"1px solid rgba(240,165,0,0.3)",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontWeight:700}}>Add Result</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Lobes */}
          {Object.keys(lobeMap).length>0 && <>
            <div style={secTitle}>Lobe Distribution</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:4}}>
              {LOBES.map(l=>(
                <div key={l} style={{background:"rgba(91,155,213,0.08)",border:"1px solid rgba(91,155,213,0.2)",borderRadius:8,padding:"7px 4px",textAlign:"center",opacity:lobeMap[l]?1:0.3}}>
                  <div style={{fontSize:16,fontWeight:800,color:C.blue}}>{lobeMap[l]||0}</div>
                  <div style={{fontSize:10,color:"#6b7fa3",fontWeight:700}}>{l}</div>
                </div>
              ))}
            </div>
          </>}

          {/* Hospitals */}
          {Object.keys(hospitals).length>0 && <>
            <div style={secTitle}>By Hospital</div>
            {Object.entries(hospitals).sort((a,b)=>b[1]-a[1]).map(([h,n])=>{
              const open=selHosp===h;
              return (
                <div key={h}>
                  <div onClick={()=>setSelHosp(open?null:h)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:open?"rgba(91,155,213,0.08)":"rgba(255,255,255,0.03)",border:`1px solid ${open?"rgba(91,155,213,0.4)":C.border}`,borderRadius:9,padding:"9px 12px",marginBottom:4,cursor:"pointer"}}>
                    <span style={{fontSize:13,fontWeight:600}}>🏥 {h}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:12,color:"#6b7280"}}>{n} case{n!==1?"s":""}</span>
                      <span style={{color:"#6b7280",fontSize:11}}>{open?"▲":"▼"}</span>
                    </div>
                  </div>
                  {open && cases.filter(e=>e.hospitalName===h).map(entry=>{
                    const idx=cases.length-cases.indexOf(entry);
                    const hp=entry.diagnosticSample===null||entry.diagnosticSample===undefined;
                    return (
                      <div key={entry.id} style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"8px 10px",marginBottom:5,border:"1px solid rgba(91,155,213,0.15)",marginLeft:6}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:12}}>Case #{idx}{entry.caseRef&&<span style={{fontSize:10,background:"rgba(91,155,213,0.15)",color:C.blue,borderRadius:4,padding:"1px 5px",fontWeight:700,marginLeft:5}}>#{entry.caseRef}</span>}</div>
                            {entry.lobe&&<div style={{fontSize:11,color:C.blue,marginTop:1}}>{entry.lobe}</div>}
                            {hp?<div style={{fontSize:10,color:C.amber,fontWeight:600,marginTop:1}}>⏳ Histology pending</div>:entry.diagnosis&&<div style={{fontSize:10,color:C.lime,fontWeight:600,marginTop:1}}>🔬 {entry.diagnosis}</div>}
                          </div>
                          <button onClick={()=>{setTab("log");setExpandedId(entry.id);setSelHosp(null);}} style={{fontSize:11,color:C.blue,background:"rgba(91,155,213,0.1)",border:"1px solid rgba(91,155,213,0.25)",borderRadius:5,padding:"3px 7px",cursor:"pointer",fontWeight:700}}>View</button>
                        </div>
                        {(entry.complications||[]).length>0 && (
                          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                            {(entry.complications||[]).map(cid=>{const comp=COMPS.find(c=>c.id===cid);return comp?<Chip key={cid} comp={comp}/>:null;})}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </>}

          {/* Complication overview */}
          <div style={secTitle}>Complication Overview</div>
          {COMPS.map(c=>{
            const count=counts[c.id]||0;
            return (
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 12px",marginBottom:7,borderLeft:`4px solid ${c.color}`,border:`1px solid ${C.border}`,borderLeftWidth:4,borderLeftColor:c.color}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{display:"flex",alignItems:"center",justifyContent:"center",width:24}}><CompIcon comp={c} size={20}/></span>
                  <span style={{fontSize:13,fontWeight:700}}>{c.label}</span>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:800,color:c.color}}>{pct(count,total)}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{count} / {total}</div>
                </div>
              </div>
            );
          })}

          {/* Bar chart */}
          {total>0 && <>
            <div style={secTitle}>Visual Comparison</div>
            <div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:13,border:`1px solid ${C.border}`}}>
              {COMPS.map(c=>{
                const p=total?((counts[c.id]||0)/total)*100:0;
                return (
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                    <div style={{width:128,fontSize:11,color:"#aaa",display:"flex",alignItems:"center",gap:4,overflow:"hidden"}}><CompIcon comp={c} size={13}/><span style={{whiteSpace:"nowrap"}}>{c.label}</span></div>
                    <div style={{flex:1,height:7,background:"rgba(255,255,255,0.07)",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(p,100)}%`,background:c.color,borderRadius:4}}/>
                    </div>
                    <div style={{width:38,fontSize:11,fontWeight:700,textAlign:"right",color:c.color}}>{p.toFixed(1)}%</div>
                  </div>
                );
              })}
            </div>
          </>}
        </>}

        {/* ═══ LOG ═══ */}
        {tab==="log" && <>
          {/* Search */}
          <div style={{position:"relative",marginBottom:9}}>
            <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:13,pointerEvents:"none"}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="" style={{...inputSt,paddingLeft:33,paddingRight:search?32:12}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#6b7280",fontSize:15,cursor:"pointer",padding:0}}>✕</button>}
          </div>

          {/* Filter toggle */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
            <button onClick={()=>setShowFilters(p=>!p)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,border:`1px solid ${hasFilter?"rgba(91,155,213,0.5)":C.border}`,background:hasFilter?"rgba(91,155,213,0.12)":"rgba(255,255,255,0.04)",color:hasFilter?C.blue:"#6b7280"}}>
              <span>⚙️</span><span>{hasFilter?"Filters active":"Filter & Analyse"}</span><span style={{marginLeft:2}}>{showFilters?"▲":"▼"}</span>
            </button>
            {hasFilter&&<button onClick={()=>{setFType("");setFLobe("");setFDiag("");setFComp("");}} style={{fontSize:11,color:C.red,cursor:"pointer",padding:"4px 8px",border:"1px solid rgba(224,82,82,0.3)",borderRadius:6,background:"rgba(224,82,82,0.08)",fontWeight:700}}>Clear</button>}
          </div>

          {/* Filter panel */}
          {showFilters && (
            <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:10,padding:13,marginBottom:11}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"1px",marginBottom:5}}>Lesion Type</div>
              <Seg options={LTYPES} value={fType} onChange={setFType}/>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"1px",margin:"9px 0 5px"}}>Lobe</div>
              <Seg options={LOBES} value={fLobe} onChange={setFLobe}/>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"1px",margin:"9px 0 5px"}}>Complication</div>
              <Seg options={COMPS.map(c=>c.label)} value={fComp} onChange={setFComp}/>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"1px",margin:"9px 0 5px"}}>Diagnosis Contains</div>
              <input value={fDiag} onChange={e=>setFDiag(e.target.value)} placeholder="" style={inputSt}/>
            </div>
          )}

          {/* Analysis summary */}
          {hasFilter && (
            <div style={{background:"rgba(91,155,213,0.08)",border:"1px solid rgba(91,155,213,0.2)",borderRadius:10,padding:"11px 13px",marginBottom:11}}>
              <div style={{fontSize:13,fontWeight:700,color:C.blue,marginBottom:8}}>📊 {filtered.length} of {total} cases match</div>
              {(()=>{
                const dm={};
                filtered.forEach(e=>{if(e.diagnosis){const d=e.diagnosis.trim();dm[d]=(dm[d]||0)+1;}});
                const wd=filtered.filter(e=>e.diagnosis).length;
                if(!Object.keys(dm).length) return <div style={{fontSize:12,color:"#6b7280",fontStyle:"italic"}}>No histology results yet in matched cases</div>;
                return Object.entries(dm).sort((a,b)=>b[1]-a[1]).map(([diag,n])=>{
                  const p=wd?((n/wd)*100).toFixed(0):0;
                  return (
                    <div key={diag} style={{marginBottom:7}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:12,color:"#e0e0e0",fontWeight:600}}>{diag}</span>
                        <span style={{fontSize:12,color:C.blue,fontWeight:700}}>{n} ({p}%)</span>
                      </div>
                      <div style={{height:4,background:"rgba(255,255,255,0.07)",borderRadius:2}}>
                        <div style={{height:"100%",width:`${p}%`,background:C.blue,borderRadius:2}}/>
                      </div>
                    </div>
                  );
                });
              })()}
            </div>
          )}

          <div style={{...secTitle,marginTop:0}}>Procedure Log ({filtered.length}{filtered.length!==total?` of ${total}`:""} {filtered.length===1?"entry":"entries"})</div>

          {filtered.length===0 && (
            <div style={{textAlign:"center",color:"#6b7280",padding:"28px 20px",fontStyle:"italic",fontSize:13}}>
              {hasFilter?"No cases match.":"No entries yet. Tap + to add your first case."}
            </div>
          )}

          {filtered.map(entry=>{
            const idx=cases.length-cases.indexOf(entry);
            const isOpen=expandedId===entry.id;
            const hpend=entry.diagnosticSample===null||entry.diagnosticSample===undefined;
            return (
              <div key={entry.id} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"11px 13px",marginBottom:8,border:`1px solid ${hpend?"rgba(240,165,0,0.25)":C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setExpandedId(isOpen?null:entry.id)}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:14}}>Case #{idx}</span>
                      {entry.hospitalName&&<span style={{fontSize:12,color:"#6b7fa3"}}>· {entry.hospitalName}</span>}
                      {entry.caseRef&&<span style={{fontSize:11,background:"rgba(91,155,213,0.15)",color:C.blue,borderRadius:5,padding:"1px 6px",fontWeight:700}}>#{entry.caseRef}</span>}
                    </div>
                    {entry.lobe&&<div style={{fontSize:12,color:C.blue,marginTop:2}}>{entry.lobe}{entry.lesionType&&` · ${entry.lesionType}`}</div>}
                    {hpend?<div style={{fontSize:11,color:C.amber,marginTop:2,fontWeight:600}}>⏳ Histology pending</div>:entry.diagnosis&&<div style={{fontSize:11,color:C.lime,marginTop:2,fontWeight:600}}>🔬 {entry.diagnosis}</div>}
                  </div>
                  <span style={{color:"#6b7280",fontSize:11,marginLeft:8,flexShrink:0}}>{isOpen?"▲":"▼"}</span>
                </div>

                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>
                  {(entry.complications||[]).length===0
                    ?<span style={{fontSize:11,color:"#6b7280",fontStyle:"italic"}}>No complications</span>
                    :(entry.complications||[]).map(cid=>{const comp=COMPS.find(c=>c.id===cid);return comp?<Chip key={cid} comp={comp}/>:null;})}
                </div>

                {isOpen && (
                  <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      {[
                        entry.datePerformed&&["Date",fmtD(entry.datePerformed)],
                        entry.age&&["Age",`${entry.age} yrs`],
                        entry.sex&&["Sex",entry.sex==="M"?"Male":"Female"],
                        entry.supervision&&["Supervision",entry.supervision],
                        entry.lobe&&["Lobe",entry.lobe],
                        entry.lesionType&&["Lesion Type",entry.lesionType],
                        entry.lesionSize&&["Lesion Size",`${entry.lesionSize} mm`],
                        entry.distance&&["Distance",`${entry.distance} mm`],
                        entry.needleSize&&["Needle",entry.needleSize],
                        entry.passes&&["Passes",entry.passes],
                        ["Emphysema",entry.emphysemaTrack?"Yes ⚠️":"No",entry.emphysemaTrack?C.amber:undefined],
                      ].filter(Boolean).map(([l,v,c])=>(
                        <div key={l}>
                          <div style={{fontSize:10,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.8px"}}>{l}</div>
                          <div style={{fontSize:13,fontWeight:700,color:c||"#e0e0e0",marginTop:1}}>{v}</div>
                        </div>
                      ))}
                    </div>

                    {entry.complicationNotes&&<div style={{background:"rgba(255,255,255,0.03)",borderRadius:7,padding:"8px 10px",marginBottom:8,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:10,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>Complication Notes</div>
                      <div style={{fontSize:12,color:"#ccc",lineHeight:1.5}}>{entry.complicationNotes}</div>
                    </div>}
                    {entry.comments&&<div style={{background:"rgba(255,255,255,0.03)",borderRadius:7,padding:"8px 10px",marginBottom:8,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:10,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:2}}>Comments</div>
                      <div style={{fontSize:12,color:"#ccc",lineHeight:1.5}}>{entry.comments}</div>
                    </div>}

                    <div style={{display:"flex",gap:6,marginBottom:10}}>
                      <button onClick={()=>openEdit(entry,"details")} style={{flex:1,padding:"7px",borderRadius:7,border:"1px solid rgba(91,155,213,0.3)",background:"rgba(91,155,213,0.08)",color:C.blue,fontSize:11,fontWeight:700,cursor:"pointer"}}>✎ Edit Details</button>
                      <button onClick={()=>openEdit(entry,"complications")} style={{flex:1,padding:"7px",borderRadius:7,border:"1px solid rgba(91,155,213,0.3)",background:"rgba(91,155,213,0.08)",color:C.blue,fontSize:11,fontWeight:700,cursor:"pointer"}}>✎ Edit Complications</button>
                    </div>

                    <div style={{borderRadius:9,padding:"10px 12px",background:hpend?"rgba(240,165,0,0.06)":"rgba(163,230,53,0.06)",border:`1px solid ${hpend?"rgba(240,165,0,0.25)":"rgba(163,230,53,0.25)"}`}}>
                      <div style={{fontSize:12,fontWeight:700,color:hpend?C.amber:C.lime,marginBottom:hpend?0:6}}>🔬 Histology {hpend?"Pending":"Result"}</div>
                      {!hpend&&<>
                        {entry.diagnosis&&<div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{entry.diagnosis}</div>}
                        {entry.histologyNotes&&<div style={{fontSize:12,color:"#aaa",lineHeight:1.5,marginBottom:4}}>{entry.histologyNotes}</div>}
                        <div style={{fontSize:11,fontWeight:600,color:entry.diagnosticSample?C.green:C.red}}>{entry.diagnosticSample?"✅ Diagnostic sample":"❌ Non-diagnostic"}</div>
                      </>}
                      <button onClick={()=>openEdit(entry,"histology")} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:7,cursor:"pointer",background:"transparent",border:`1px solid ${hpend?"rgba(240,165,0,0.4)":"rgba(163,230,53,0.3)"}`,color:hpend?C.amber:C.lime,fontSize:12,fontWeight:700}}>
                        {hpend?"＋ Add Histology Result":"✎ Edit Histology Result"}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </>}

        {/* ═══ RATES ═══ */}
        {tab==="rates" && <>
          <div style={{...secTitle,marginTop:0}}>Live Complication Rates</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:4}}>
            {COMPS.map(c=>{
              const p=total?((counts[c.id]||0)/total*100).toFixed(1):"0.0";
              return (
                <div key={c.id} style={{borderRadius:12,padding:"13px 10px",textAlign:"center",border:`1px solid ${C.border}`,background:c.bg}}>
                  <div style={{marginBottom:3,display:"flex",justifyContent:"center"}}><CompIcon comp={c} size={26}/></div>
                  <div style={{fontSize:24,fontWeight:900,lineHeight:1,color:c.color}}>{p}%</div>
                  <div style={{fontSize:11,fontWeight:700,color:"#ccc",marginTop:3}}>{c.label}</div>
                  <div style={{fontSize:10,color:"#6b7280",marginTop:1}}>{counts[c.id]||0} of {total}</div>
                </div>
              );
            })}
            {[[noComp,"🟢","No Complications","rgba(34,197,94,0.08)",C.green],[counts.diagnostic,"🔬","Diagnostic Yield","rgba(163,230,53,0.08)",C.lime]].map(([n,icon,lbl,bg,color])=>{
              const p=total?((n/total)*100).toFixed(1):"0.0";
              return (
                <div key={lbl} style={{borderRadius:12,padding:"13px 10px",textAlign:"center",border:`1px solid ${C.border}`,background:bg}}>
                  <div style={{fontSize:24,marginBottom:3}}>{icon}</div>
                  <div style={{fontSize:24,fontWeight:900,lineHeight:1,color}}>{p}%</div>
                  <div style={{fontSize:11,fontWeight:700,color:"#ccc",marginTop:3}}>{lbl}</div>
                  <div style={{fontSize:10,color:"#6b7280",marginTop:1}}>{n} of {total}</div>
                </div>
              );
            })}
          </div>

          <div style={secTitle}>Procedural Averages</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:4}}>
            {[["Avg Lesion Size",avgLesion?`${avgLesion} mm`:"—"],["Avg Distance",avgDist?`${avgDist} mm`:"—"],["Emphysema in Needle Track",pct(counts.emphysema,total)],["Histology received",cases.filter(e=>e.diagnosticSample!==null&&e.diagnosticSample!==undefined).length],["Histology pending",counts.histoPending]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
                <span style={{color:"#aaa"}}>{l}</span><span style={{fontWeight:700,color:C.blue}}>{v}</span>
              </div>
            ))}
          </div>

          <div style={secTitle}>Reference Benchmarks</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#ccc",marginBottom:10}}>Published Literature Ranges</div>
            {[["Haemoptysis (minor)","1–5%","#e05252"],["Pneumothorax","15–25%","#5b9bd5"],["Chest Drain Required","1–5%","#f0a500"],["Air Embolus","< 0.1%","#a855f7"],["Mortality","< 0.1%","#6b7280"],["Diagnostic Yield","80–95%","#a3e635"]].map(([l,r,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <span style={{fontSize:12,color:"#aaa"}}>{l}</span>
                <span style={{fontSize:13,fontWeight:700,color:c}}>{r}</span>
              </div>
            ))}
            <div style={{marginTop:10,fontSize:10,color:"#6b7280",borderTop:`1px solid ${C.border}`,paddingTop:8}}>⚠️ Rates vary by technique and patient cohort.</div>
          </div>

          <div style={{textAlign:"center",marginTop:14}}>
            <button onClick={()=>setConfirmClear(1)} style={{background:"rgba(224,82,82,0.1)",border:"1px solid rgba(224,82,82,0.3)",color:C.red,padding:"8px 20px",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>🗑 Reset All Data</button>
          </div>
        </>}

        {/* ═══ SETTINGS ═══ */}
        {tab==="settings" && <>

          {/* Who you are */}
          <div style={{...secTitle,marginTop:0}}>Your Profile</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px"}}>
            <FL label="Your Name / Initials">
              <input value={settings.yourName} onChange={e=>setSetting("yourName",e.target.value)}
                placeholder="" style={inputSt}/>
            </FL>
            <div style={{fontSize:12,color:"#6b7280",marginTop:-6}}>Shown in the app header</div>
          </div>

          {/* Default values */}
          <div style={secTitle}>Default Values</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px"}}>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:14,lineHeight:1.5}}>
              These auto-fill each new case. You can always change them when entering a case.
            </div>

            <FL label="Default Hospital">
              <input value={settings.defaultHospital} onChange={e=>setSetting("defaultHospital",e.target.value)}
                placeholder="" style={inputSt}/>
            </FL>

            <FL label="Default Supervision">
              <Seg options={SUPS} value={settings.defaultSupervision} onChange={v=>setSetting("defaultSupervision",v)}/>
            </FL>

            <FL label="Default Needle Size">
              <input value={settings.defaultNeedleSize} onChange={e=>setSetting("defaultNeedleSize",e.target.value)}
                placeholder="" style={inputSt}/>
            </FL>

            <FL label="Default Passes">
              <input type="number" value={settings.defaultPasses} onChange={e=>setSetting("defaultPasses",e.target.value)}
                placeholder="" min="1" style={inputSt}/>
            </FL>

            <div style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:8,padding:"10px 12px",marginTop:4,fontSize:12,color:"#22c55e"}}>
              ✓ Defaults active — will pre-fill your next new case
            </div>
          </div>

          {/* Data management */}
          <div style={secTitle}>Data Management</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:2,lineHeight:1.5}}>
              Export a backup before swapping phones or as a safety copy.
            </div>
            <button onClick={exportData} style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",color:"#22c55e",padding:"11px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
              📤 Export All Data (Backup)
            </button>
            <label style={{background:"rgba(91,155,213,0.1)",border:"1px solid rgba(91,155,213,0.3)",color:C.blue,padding:"11px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center",display:"block"}}>
              📥 Import Data (Restore)
              <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            </label>
            <button onClick={()=>setConfirmClear(1)} style={{background:"rgba(224,82,82,0.1)",border:"1px solid rgba(224,82,82,0.3)",color:C.red,padding:"11px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>
              🗑 Reset All Data
            </button>
          </div>

          {/* Legal */}
          <div style={secTitle}>Legal & Info</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            {[
              ["📋 View Disclaimer", ()=>setAccepted(false)],
              ["🔒 Privacy Policy", ()=>setTab("settings")],
            ].map(([label, action], i)=>(
              <button key={label} onClick={action} style={{
                width:"100%",padding:"13px 14px",background:"none",border:"none",cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"space-between",
                borderBottom:i===0?`1px solid ${C.border}`:"none",
                color:"#e0e0e0",fontSize:13,fontWeight:600,
              }}>
                <span>{label}</span>
                <span style={{color:"#6b7280",fontSize:12}}>›</span>
              </button>
            ))}
          </div>

          {/* About */}
          <div style={secTitle}>About</div>
          <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <span style={{fontSize:36}}>🫁</span>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>Lung Biopsy Tracker</div>
                <div style={{fontSize:12,color:"#6b7280"}}>Version 1.0 · For personal audit use only</div>
              </div>
            </div>
            <div style={{fontSize:12,color:"#6b7280",lineHeight:1.7,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
              Built with AI assistance (Claude, Anthropic). Not a medical device. Not assessed by the MHRA. Data stored locally on this device.
            </div>
          </div>

          <div style={{height:20}}/>

          {/* Save button */}
          <button onClick={()=>{ try{localStorage.setItem('lb_settings',JSON.stringify(settings));}catch{} showToast("Settings saved ✓"); }} style={{
            width:"100%", padding:"15px", borderRadius:12,
            background:"linear-gradient(135deg,#5b9bd5,#3b7abf)",
            border:"none", color:"#fff", fontSize:16, fontWeight:700,
            cursor:"pointer", boxShadow:"0 4px 14px rgba(91,155,213,0.35)",
            marginBottom:8,
          }}>
            Save Settings ✓
          </button>
          <div style={{textAlign:"center",fontSize:11,color:"#4b5563",marginBottom:20}}>
            Settings are saved to this device
          </div>
        </>}
      </div>

      {/* FAB */}
      <button onClick={openAdd} style={{position:"fixed",bottom:24,right:20,width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#5b9bd5,#3b7abf)",border:"none",color:"#fff",fontSize:26,cursor:"pointer",boxShadow:"0 4px 18px rgba(91,155,213,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>＋</button>

      {/* ═══ ADD MODAL ═══ */}
      {addOpen && (
        <Overlay onClose={()=>setAddOpen(false)}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            {[0,1].map(i=><div key={i} style={{display:"flex",alignItems:"center"}}>
              <div style={{width:9,height:9,borderRadius:"50%",background:i<=addStep?C.blue:"rgba(255,255,255,0.15)"}}/>
              {i===0&&<div style={{width:36,height:2,background:addStep>0?C.blue:"rgba(255,255,255,0.1)"}}/>}
            </div>)}
          </div>

          {addStep===0 ? (
            <>
              <ModalTitle main="New Biopsy Case" sub="Step 1 of 2 — Procedure details"/>
              <FL label="Hospital Name"><input value={addForm.hospitalName} onChange={e=>setAddForm(p=>({...p,hospitalName:e.target.value}))} placeholder="" style={inputSt}/></FL>
              <FL label="Case Reference" hint="(your own code only)"><input value={addForm.caseRef} onChange={e=>setAddForm(p=>({...p,caseRef:e.target.value}))} placeholder="" style={inputSt}/></FL>
              <FL label="Date Performed"><input type="date" value={addForm.datePerformed} onChange={e=>setAddForm(p=>({...p,datePerformed:e.target.value}))} style={{...inputSt,colorScheme:"dark"}}/></FL>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}><FL label="Age"><input type="number" value={addForm.age} onChange={e=>setAddForm(p=>({...p,age:e.target.value}))} placeholder="" min="0" style={inputSt}/></FL></div>
                <div style={{flex:1}}><FL label="Sex"><Seg options={["M","F"]} value={addForm.sex} onChange={v=>setAddForm(p=>({...p,sex:v}))}/></FL></div>
              </div>
              <FL label="Supervision"><Seg options={SUPS} value={addForm.supervision} onChange={v=>setAddForm(p=>({...p,supervision:v}))}/></FL>
              <FL label="Lobe"><Seg options={LOBES} value={addForm.lobe} onChange={v=>setAddForm(p=>({...p,lobe:v}))}/></FL>
              <FL label="Lesion Type"><Seg options={LTYPES} value={addForm.lesionType} onChange={v=>setAddForm(p=>({...p,lesionType:v}))}/></FL>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}><FL label="Lesion Size (mm)"><input type="number" value={addForm.lesionSize} onChange={e=>setAddForm(p=>({...p,lesionSize:e.target.value}))} placeholder="" min="0" style={inputSt}/></FL></div>
                <div style={{flex:1}}><FL label="Distance (mm)"><input type="number" value={addForm.distance} onChange={e=>setAddForm(p=>({...p,distance:e.target.value}))} placeholder="" min="0" style={inputSt}/></FL></div>
              </div>
              <FL label="Emphysema in Needle Track"><Tog value={addForm.emphysemaTrack} onChange={v=>setAddForm(p=>({...p,emphysemaTrack:v}))} label="Emphysema Present"/></FL>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}><FL label="Needle Size"><input value={addForm.needleSize} onChange={e=>setAddForm(p=>({...p,needleSize:e.target.value}))} placeholder="" style={inputSt}/></FL></div>
                <div style={{flex:1}}><FL label="Passes"><input type="number" value={addForm.passes} onChange={e=>setAddForm(p=>({...p,passes:e.target.value}))} placeholder="" min="1" style={inputSt}/></FL></div>
              </div>
              <FL label="Comments" hint="(optional)"><textarea value={addForm.comments} onChange={e=>setAddForm(p=>({...p,comments:e.target.value}))} placeholder="" style={taSt}/></FL>
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button style={cancelBt} onClick={()=>setAddOpen(false)}>Cancel</button>
                <button style={saveBt} onClick={()=>setAddStep(1)}>Next →</button>
              </div>
            </>
          ) : (
            <>
              <ModalTitle main="Complications" sub="Step 2 of 2 — Select all that apply"/>
              <div style={{background:"rgba(91,155,213,0.07)",borderRadius:9,padding:"8px 11px",marginBottom:12,fontSize:12,color:"#6b9fd4"}}>💡 Histology can be added later once results are back</div>
              {COMPS.map(c=>(
                <CompToggle key={c.id} comp={c} selected={!!addComps[c.id]} onToggle={()=>setAddComps(p=>({...p,[c.id]:!p[c.id]}))}/>
              ))}
              <FL label="Complication Notes" hint="(optional)">
                <textarea value={addCompNotes} onChange={e=>setAddCompNotes(e.target.value)} placeholder="" style={taSt}/>
              </FL>
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button style={cancelBt} onClick={()=>setAddStep(0)}>← Back</button>
                <button style={saveBt} onClick={saveCase}>Save Case ✓</button>
              </div>
            </>
          )}
        </Overlay>
      )}

      {/* ═══ EDIT MODAL ═══ */}
      {editEntry && (
        <Overlay onClose={()=>setEditEntry(null)}>
          <div style={{display:"flex",gap:4,marginBottom:14,background:"rgba(255,255,255,0.04)",borderRadius:9,padding:3}}>
            {[["details","📋 Details"],["complications","⚠️ Complications"],["histology","🔬 Histology"]].map(([sec,lbl])=>(
              <button key={sec} onClick={()=>setEditSec(sec)} style={{flex:1,padding:"7px 3px",borderRadius:7,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,background:editSec===sec?"rgba(91,155,213,0.25)":"transparent",color:editSec===sec?C.blue:"#6b7280"}}>{lbl}</button>
            ))}
          </div>
          <div style={{fontSize:10,color:"#6b7280",textAlign:"center",marginBottom:6,textTransform:"uppercase",letterSpacing:"1px"}}>
            Editing Case {cases.length-cases.indexOf(editEntry)}{editEntry.hospitalName&&` · ${editEntry.hospitalName}`}
          </div>

          {editSec==="details" && <>
            <ModalTitle main="Edit Case Details"/>
            <FL label="Hospital Name"><input value={editForm.hospitalName} onChange={e=>setEditForm(p=>({...p,hospitalName:e.target.value}))} placeholder="" style={inputSt}/></FL>
            <FL label="Case Reference" hint="(your own code only)"><input value={editForm.caseRef} onChange={e=>setEditForm(p=>({...p,caseRef:e.target.value}))} placeholder="" style={inputSt}/></FL>
            <FL label="Date Performed"><input type="date" value={editForm.datePerformed} onChange={e=>setEditForm(p=>({...p,datePerformed:e.target.value}))} style={{...inputSt,colorScheme:"dark"}}/></FL>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><FL label="Age"><input type="number" value={editForm.age} onChange={e=>setEditForm(p=>({...p,age:e.target.value}))} placeholder="" style={inputSt}/></FL></div>
              <div style={{flex:1}}><FL label="Sex"><Seg options={["M","F"]} value={editForm.sex} onChange={v=>setEditForm(p=>({...p,sex:v}))}/></FL></div>
            </div>
            <FL label="Supervision"><Seg options={SUPS} value={editForm.supervision} onChange={v=>setEditForm(p=>({...p,supervision:v}))}/></FL>
            <FL label="Lobe"><Seg options={LOBES} value={editForm.lobe} onChange={v=>setEditForm(p=>({...p,lobe:v}))}/></FL>
            <FL label="Lesion Type"><Seg options={LTYPES} value={editForm.lesionType} onChange={v=>setEditForm(p=>({...p,lesionType:v}))}/></FL>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><FL label="Lesion Size (mm)"><input type="number" value={editForm.lesionSize} onChange={e=>setEditForm(p=>({...p,lesionSize:e.target.value}))} placeholder="" style={inputSt}/></FL></div>
              <div style={{flex:1}}><FL label="Distance (mm)"><input type="number" value={editForm.distance} onChange={e=>setEditForm(p=>({...p,distance:e.target.value}))} placeholder="" style={inputSt}/></FL></div>
            </div>
            <FL label="Emphysema in Needle Track"><Tog value={editForm.emphysemaTrack} onChange={v=>setEditForm(p=>({...p,emphysemaTrack:v}))} label="Emphysema Present"/></FL>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><FL label="Needle Size"><input value={editForm.needleSize} onChange={e=>setEditForm(p=>({...p,needleSize:e.target.value}))} placeholder="" style={inputSt}/></FL></div>
              <div style={{flex:1}}><FL label="Passes"><input type="number" value={editForm.passes} onChange={e=>setEditForm(p=>({...p,passes:e.target.value}))} placeholder="" style={inputSt}/></FL></div>
            </div>
            <FL label="Comments" hint="(optional)"><textarea value={editForm.comments} onChange={e=>setEditForm(p=>({...p,comments:e.target.value}))} style={taSt}/></FL>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button style={cancelBt} onClick={()=>setEditEntry(null)}>Cancel</button>
              <button style={saveBt} onClick={saveEdit}>Save Changes ✓</button>
            </div>
          </>}

          {editSec==="complications" && <>
            <ModalTitle main="Edit Complications" sub="Update or add delayed complications"/>
            {COMPS.map(c=>(
              <CompToggle key={c.id} comp={c} selected={!!editComps[c.id]} onToggle={()=>setEditComps(p=>({...p,[c.id]:!p[c.id]}))}/>
            ))}
            <FL label="Complication Notes" hint="(optional)">
              <textarea value={editCompNotes} onChange={e=>setEditCompNotes(e.target.value)} placeholder="" style={taSt}/>
            </FL>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button style={cancelBt} onClick={()=>setEditEntry(null)}>Cancel</button>
              <button style={saveBt} onClick={saveEdit}>Save Changes ✓</button>
            </div>
          </>}

          {editSec==="histology" && <>
            <ModalTitle main="Histology Result" sub={`Biopsy: ${fmtD(editEntry.createdAt)}${editEntry.lobe?` · ${editEntry.lobe}`:""}`}/>
            <FL label="Diagnosis"><input value={editHisto.diagnosis} onChange={e=>setEditHisto(p=>({...p,diagnosis:e.target.value}))} placeholder="" style={inputSt}/></FL>
            <FL label="Histology Notes" hint="(optional)"><textarea value={editHisto.histologyNotes} onChange={e=>setEditHisto(p=>({...p,histologyNotes:e.target.value}))} placeholder="" style={taSt}/></FL>
            <FL label="Diagnostic Sample Obtained?">
              <div style={{display:"flex",gap:8}}>
                {[{label:"✅ Yes — Diagnostic",val:true,c:C.green},{label:"❌ No — Non-diagnostic",val:false,c:C.red}].map(opt=>(
                  <button key={String(opt.val)} onClick={()=>setEditHisto(p=>({...p,diagnosticSample:opt.val}))} style={{flex:1,padding:"9px 4px",borderRadius:9,cursor:"pointer",border:`1px solid ${editHisto.diagnosticSample===opt.val?opt.c:C.border}`,background:editHisto.diagnosticSample===opt.val?opt.c+"18":"rgba(255,255,255,0.04)",color:editHisto.diagnosticSample===opt.val?opt.c:"#aaa",fontSize:11,fontWeight:700}}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </FL>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button style={cancelBt} onClick={()=>setEditEntry(null)}>Cancel</button>
              <button style={{...saveBt,background:"linear-gradient(135deg,#4ade80,#16a34a)"}} onClick={saveEdit}>Save Result ✓</button>
            </div>
          </>}
        </Overlay>
      )}

      {/* Confirm clear */}
      {confirmClear===1 && (
        <Overlay onClose={()=>setConfirmClear(0)}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:44,marginBottom:8}}>⚠️</div>
            <div style={{fontSize:19,fontWeight:800,color:"#fff",marginBottom:6}}>Reset All Data?</div>
            <div style={{fontSize:13,color:"#aaa",lineHeight:1.6}}>
              This will permanently delete all <span style={{color:"#e05252",fontWeight:700}}>{total} case{total!==1?"s":""}</span> and cannot be undone.
            </div>
          </div>
          <div style={{background:"rgba(224,82,82,0.08)",border:"1px solid rgba(224,82,82,0.2)",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:12,color:"#e05252",lineHeight:1.6}}>
            ⛔ All your complication data, histology results and case notes will be lost forever.
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={cancelBt} onClick={()=>setConfirmClear(0)}>Cancel — Keep My Data</button>
            <button style={{...saveBt,background:"rgba(224,82,82,0.2)",color:"#e05252",border:"1px solid rgba(224,82,82,0.4)"}} onClick={()=>setConfirmClear(2)}>Yes, Delete Everything</button>
          </div>
        </Overlay>
      )}

      {confirmClear===2 && (
        <Overlay onClose={()=>setConfirmClear(0)}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:44,marginBottom:8}}>🚨</div>
            <div style={{fontSize:19,fontWeight:800,color:"#e05252",marginBottom:6}}>Are You Absolutely Sure?</div>
            <div style={{fontSize:13,color:"#aaa",lineHeight:1.6}}>
              This is your <span style={{color:"#e05252",fontWeight:700}}>final warning</span>. There is no undo.
            </div>
          </div>
          <div style={{background:"rgba(224,82,82,0.1)",border:"1px solid rgba(224,82,82,0.35)",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:13,color:"#e0e0e0",fontWeight:700,marginBottom:6}}>You are about to delete:</div>
            <div style={{fontSize:13,color:"#e05252",lineHeight:2}}>
              • {total} biopsy case{total!==1?"s":""}<br/>
              • All complication records<br/>
              • All histology results<br/>
              • All case notes
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={cancelBt} onClick={()=>setConfirmClear(0)}>No — Keep My Data</button>
            <button style={{...saveBt,background:"#c0392b",border:"none"}} onClick={()=>{setCases([]);setTotal(0);setConfirmClear(0);showToast("All data deleted");}}>
              🗑 Delete All Data
            </button>
          </div>
        </Overlay>
      )}

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:88,left:"50%",transform:"translateX(-50%)",padding:"10px 22px",borderRadius:18,color:"#fff",fontSize:13,fontWeight:600,zIndex:300,background:"#1e6b3d",boxShadow:"0 4px 18px rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
